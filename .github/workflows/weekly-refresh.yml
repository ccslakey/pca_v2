name: Weekly data refresh

on:
  schedule:
    # 5am UTC Monday = 1am EDT / midnight EST — data ready well before 7am ET
    - cron: '0 5 * * 1'
  workflow_dispatch: # allow manual trigger from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 300 # 5h hard cap — kills a stalled scrape before next run

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DJANGO_SETTINGS_MODULE: pca_backend.settings
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1: current-season batting + pitching + fielding
      # --force re-ingests this year even if already logged (BBref updates stats retroactively)
      - name: Ingest season stats
        timeout-minutes: 120
        run: |
          python pipeline/ingest_bref_history.py \
            --start-year $(date +%Y) \
            --force

      # Step 2: Statcast pitch zones — incremental from 8 days ago
      # 8-day window catches any late-arriving Statcast data from last week
      - name: Ingest Statcast zones
        timeout-minutes: 120
        run: |
          python pipeline/ingest_statcast_zones.py \
            --start-date $(date -d '8 days ago' +%Y-%m-%d) \
            --min-war 5.0

      # Step 3 & 4 run after stats are committed — dependency order enforced by step sequence
      - name: Recompute James scores
        run: python manage.py compute_james_scores

      - name: Recompute primary positions
        run: python manage.py compute_primary_positions
